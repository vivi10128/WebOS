<!DOCTYPE html>
<html>
  <body style="background-image: url('mybg.jpg'); background-size: cover; background-position: center; overflow: hidden; background-repeat: no-repeat; background-attachment: fixed; height: 100vh; margin: 0;">
    <div style="position:absolute; width:100%; display: flex; background-color: rgba(168, 27, 159, 0.492); color: #ffffff;justify-content: space-between">
      <p style="margin-left: 16px;">
        VihaOS
      </p>
      <p id="timeElement" style="margin-right: 16px;">
      </p>
        <script src="script.js"></script>
    </div>
    
    <div style="background-color:black; position : absolute; top : 50%; left: 50%; transform: translate(-50%, -50%); padding : 16px; border: dashed 2px #ffffff; width: fit-content; height: fit-content; border-radius: 16px">
      <h1 style="color: #cd90de">Welcome to my WebOS</h1>
      <p style="color: #ffffff; font-size: 200 px; font-family: 'Times New Roman', serif; text-align: center">beep boop</p>
    </div>
    <div id="movingdiv" style="position: absolute; background-color: rgba(234, 99, 255, 0.599); border: 1px solid #85598a; text-align: center; width: fit-content; height:fit-content"; padding: 5px; border-radius: 8px;">
      <script>
        dragElement(document.getElementById("movingdiv"));
        function dragElement(element) {
          var initialX = 0;
          var initialY = 0;
          var currentX = 0;
          var currentY = 0;
          if(document.getElementById(element.id + "header")) {
            document.getElementById(element.id + "header").onmousedown = startDragging;
          } else {
            element.onmousedown = startDragging;
          }  
          element.onmousedown = startDragging;
        }

          function startDragging(e) {
            e = e || window.event;
            e.preventDefault();
            initialX = e.clientX;
            initialY = e.clientY;
            document.onmouseup = stopDragging;
            document.onmousemove = dragElement;
        }

          function dragElement(e) {
            e = e || window.event;
            e.preventDefault();
            currentX = initialX - e.clientX;
            currentY = initialY - e.clientY;
            initialX = e.clientX;
            initialY = e.clientY;
            element.style.top = (element.offsetTop - currentY) + "px";
            element.style.left = (element.offsetLeft - currentX) + "px";
        }

          function stopDragging() {
            document.onmouseup = null;
            document.onmousemove = null;
}
      </script>
      <p style="color:#83b2dd">move me</p>
    </div>
  </body>
</html>
